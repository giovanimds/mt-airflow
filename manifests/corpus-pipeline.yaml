apiVersion: apps/v1
kind: Deployment
metadata:
  name: universal-embedder
  namespace: airflow
  labels:
    app: universal-embedder
spec:
  replicas: 2
  selector:
    matchLabels:
      app: universal-embedder
  template:
    metadata:
      labels:
        app: universal-embedder
    spec:
      containers:
      - name: embedder
        image: registry.morescotech.com.br:5000/corpus-scraper:v1.8
        imagePullPolicy: Always
        command: ["python", "universal_embedder.py"]
        env:
        - name: REDIS_URL
          value: "redis://:246608@valkey-primary.default.svc.cluster.local:6379"
        - name: PG_HOST
          value: "postgres.morescotech.com.br"
        - name: PG_PORT
          value: "5432"
        - name: PG_USER
          value: "yugabyte"
        - name: PG_PASSWORD
          value: "YugabytePass2026"
        - name: PG_DATABASE
          value: "ai_labs"
        - name: MISTRAL_API_KEY
          valueFrom:
            secretKeyRef:
              name: airflow-api-keys
              key: MISTRAL_API_KEY
        - name: MAX_CONCURRENT_REQUESTS
          value: "1"
        - name: EMBEDDER_QUEUE_NAME
          value: "embedder_queue"
        - name: EMBEDDER_BATCH_SIZE
          value: "100"
        - name: EMBEDDER_POLL_TIMEOUT
          value: "5"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: corpus-cleaner
  namespace: airflow
  labels:
    app: corpus-cleaner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: corpus-cleaner
  template:
    metadata:
      labels:
        app: corpus-cleaner
    spec:
      containers:
      - name: cleaner
        image: 192.168.0.7:5000/corpus-scraper:v1.0
        imagePullPolicy: Always
        command: ["python", "corpus_cleaner.py"]
        env:
        - name: REDIS_URL
          value: "redis://:246608@valkey-primary.default.svc.cluster.local:6379"
        - name: PG_HOST
          value: "postgres.morescotech.com.br"
        - name: PG_PORT
          value: "5432"
        - name: PG_USER
          value: "yugabyte"
        - name: PG_PASSWORD
          value: "YugabytePass2026"
        - name: PG_DATABASE
          value: "ai_labs"
        - name: GEMINI_API_KEY_FREE
          valueFrom:
            secretKeyRef:
              name: airflow-api-keys
              key: GEMINI_API_KEY_FREE
        - name: GEMINI_API_KEY_PAID
          valueFrom:
            secretKeyRef:
              name: airflow-api-keys
              key: GEMINI_API_KEY_PAID
        - name: GEMINI_PAID_MODEL
          value: "gemini-2.5-flash-lite"
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qa-generator
  namespace: airflow
  labels:
    app: qa-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qa-generator
  template:
    metadata:
      labels:
        app: qa-generator
    spec:
      containers:
      - name: generator
        image: 192.168.0.7:5000/corpus-scraper:v1.0
        imagePullPolicy: Always
        command: ["python", "generate_qa.py"]
        env:
        - name: REDIS_URL
          value: "redis://:246608@valkey-primary.default.svc.cluster.local:6379"
        - name: PG_HOST
          value: "postgres.morescotech.com.br"
        - name: PG_PORT
          value: "5432"
        - name: PG_USER
          value: "yugabyte"
        - name: PG_PASSWORD
          value: "YugabytePass2026"
        - name: PG_DATABASE
          value: "ai_labs"
        - name: LLM_PROVIDER
          value: "mistral"
        - name: LLM_MODEL_NAME
          value: "mistral-pool"
        - name: VLLM_BASE_URL
          value: "http://192.168.0.7:8000"
        - name: GEMINI_API_KEY_FREE
          valueFrom:
            secretKeyRef:
              name: airflow-api-keys
              key: GEMINI_API_KEY_FREE
        - name: GEMINI_API_KEY_PAID
          valueFrom:
            secretKeyRef:
              name: airflow-api-keys
              key: GEMINI_API_KEY_PAID
        - name: GEMINI_PAID_MODEL
          value: "gemini-2.5-flash-lite"
        - name: MISTRAL_API_KEY
          valueFrom:
            secretKeyRef:
              name: airflow-api-keys
              key: MISTRAL_API_KEY
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi
