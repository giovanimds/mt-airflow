executor: CeleryExecutor
allowPodLaunching: true
allowJobLaunching: true

images:
  airflow:
    repository: registry.morescotech.com.br/morescotech/airflow
    tag: latest
    pullPolicy: IfNotPresent

config:
  core:
    hostname_callable: 'airflow.utils.net.get_host_ip_address'
  logging:
    remote_logging: 'True'
    remote_base_log_folder: 'gs://mt-airflow/logs'
    remote_log_conn_id: 'google_cloud_default'


env:
  - name: GOOGLE_APPLICATION_CREDENTIALS
    value: /opt/airflow/secrets/gcp/service-account.json

extraEnv: |
  - name: HOST_IP
    valueFrom:
      fieldRef:
        fieldPath: status.hostIP
  - name: VLLM_BASE_URL
    value: http://$(HOST_IP):8000
  - name: GOOGLE_API_KEY
    valueFrom:
      secretKeyRef:
        name: gemini-secrets
        key: google-api-key
  - name: DEEPSEEK_API_KEY
    valueFrom:
      secretKeyRef:
        name: gemini-secrets
        key: deepseek-api-key
  - name: MISTRAL_API_KEY
    valueFrom:
      secretKeyRef:
        name: gemini-secrets
        key: mistral-api-key

volumes:
  - name: gcp-service-account
    secret:
      secretName: airflow-gcp-sa

volumeMounts:
  - name: gcp-service-account
    mountPath: /opt/airflow/secrets/gcp
    readOnly: true

data:
  metadataSecretName: airflow-metadata
  resultBackendSecretName: airflow-result-backend

fernetKeySecretName: airflow-fernet
apiSecretKeySecretName: airflow-api
jwtSecretName: airflow-jwt

postgresql:
  enabled: false

redis:
  enabled: true
  persistence:
    enabled: true
    storageClassName: local-path
    size: 1Gi

pgbouncer:
  enabled: false

flower:
  enabled: false

statsd:
  enabled: true

webserver:
  replicas: 1
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

apiServer:
  replicas: 1
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

scheduler:
  replicas: 1
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

triggerer:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 300m
      memory: 512Mi

dagProcessor:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 300m
      memory: 512Mi

workers:
  celery:
    enableDefault: true
    replicas: 1
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 4Gi

logs:
  persistence:
    enabled: false
    storageClassName: local-path
    size: 10Gi

dags:
  persistence:
    enabled: false
  gitSync:
    enabled: true
    repo: https://github.com/giovanimds/mt-airflow.git
    branch: main
    subPath: "dags"
    wait: 60

ingress:
  web:
    enabled: false
  apiServer:
    enabled: true
    ingressClassName: traefik
    hosts:
      - name: "airflow.morescotech.com.br"
  flower:
    enabled: false

cleanup:
  enabled: true

databaseCleanup:
  enabled: false

createUserJob:
  enabled: true
  defaultUser:
    enabled: true
    role: Admin
    username: admin
    email: admin@example.com
    firstName: admin
    lastName: user
    password: admin

migrateDatabaseJob:
  enabled: true